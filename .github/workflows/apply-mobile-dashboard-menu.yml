name: Apply mobile dashboard menu

on:
  push:
    branches:
      - fix/mobile-dashboard-dropdowns
    paths:
      - .mobile-menu-trigger

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mobile-dashboard-dropdowns
      - name: Add mobile menu script to dashboards
        run: |
          python - <<'PY'
          from pathlib import Path

          for filename in ('candidate-dashboard.html', 'employer-dashboard.html'):
              path = Path(filename)
              text = path.read_text()
              tag = '<script src="dashboard-mobile-menu.js?v=2" defer></script>'
              if tag not in text:
                  text = text.replace('</body>', tag + '\n</body>')
              path.write_text(text)
          PY
      - name: Commit patched dashboards
        run: |
          git config user.name "Rolexa GitHub Action"
          git config user.email "actions@users.noreply.github.com"
          git add candidate-dashboard.html employer-dashboard.html
          git diff --cached --quiet || git commit -m "Load mobile dropdown navigation on dashboards"
          git push
