:root{--ink:#071025;--navy:#0A1738;--blue:#176BFF;--paper:#F5F7FC;--line:rgba(7,16,37,.1);--muted:#6B7280}*{box-sizing:border-box}html,body{margin:0;background:var(--paper);color:var(--ink);font-family:Inter,sans-serif}button,input,textarea,select{font-family:inherit}a{text-decoration:none;color:inherit}h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0}.shell{min-height:100vh;display:grid;grid-template-columns:260px 1fr}.side{height:100vh;position:sticky;top:0;background:linear-gradient(180deg,#071025,#091A42);color:#fff;padding:24px 18px;display:flex;flex-direction:column}.brand{font-family:Georgia,serif;font-size:28px;font-weight:700;margin:0 4px 28px}.nav{display:grid;gap:7px}.nav a{color:#C7D3FF;border-radius:13px;padding:12px 13px;font-size:14px;font-weight:800}.nav a.active{background:var(--blue);color:#fff}.nav button{display:none}.side-card{margin-top:auto;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:18px}.side-card h3{font-size:17px;margin-bottom:7px}.side-card p{font-size:13px;line-height:1.55;color:#C7D3FF;margin:0}.main{min-width:0}.topbar{height:76px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:10}.back{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);border-radius:999px;padding:9px 13px;font-weight:900;font-size:12px}.user{display:flex;align-items:center;gap:12px}.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#176BFF,#8CA6FF);display:flex;align-items:center;justify-content:center;font-weight:900;overflow:hidden}.user small{display:block;color:#AAB6D8;font-size:12px;margin-top:1px}.content{padding:28px 32px 42px}.page{display:block}.page-head{margin-bottom:18px}.page-head h1{font-size:34px}.page-head p{font-size:15px;color:var(--muted);line-height:1.5;margin:7px 0 0}.card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 16px 46px rgba(7,16,37,.05);padding:20px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:grid;gap:7px}.field.full{grid-column:1/-1}.field label{font-size:12px;font-weight:900;color:#101F4A;text-transform:uppercase;letter-spacing:.045em}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:12px;background:var(--paper);padding:13px 14px;font-size:14px;color:var(--ink);outline:none}.field textarea{min-height:112px;resize:vertical}.field input:focus,.field textarea:focus,.field select:focus{background:#fff;border-color:var(--blue)}.primary{border:0;background:var(--blue);color:#fff;border-radius:999px;padding:13px 20px;font-size:14px;font-weight:900}.primary:disabled{opacity:.65}.statusbar{display:none;margin:0 0 16px;border-radius:14px;padding:12px 14px;font-size:13px;font-weight:800}.statusbar.show{display:block}.statusbar.good{background:#E1F6EB;color:#176B49}.statusbar.bad{background:#FBE4E1;color:#A33327}.statusbar.info{background:#EEF3FF;color:#2946C7}@media(max-width:900px){.shell{grid-template-columns:1fr}.side{display:none}.topbar{padding:0 20px}.content{padding:22px 20px 34px}.form-grid{grid-template-columns:1fr}.page-head h1{font-size:29px}}
</style>
